<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>連絡先クリーナー – アドレス帳を自動整理</title>
  <meta name="description" content="スマホのアドレス帳を自動整理。重複や表記ゆれを解消し、きれいなVCFファイルとしてエクスポート。">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-512.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] }

  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Noto Sans JP', sans-serif; -webkit-font-smoothing: antialiased; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes spinSmooth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse2 { 0%,100% { opacity: .6; } 50% { opacity: 1; } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes confetti1 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(-40px,-80px) rotate(200deg) scale(0); opacity:0; } }
    @keyframes confetti2 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(50px,-70px) rotate(-180deg) scale(0); opacity:0; } }
    @keyframes confetti3 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(-30px,-90px) rotate(160deg) scale(0); opacity:0; } }
    @keyframes confetti4 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(60px,-60px) rotate(-220deg) scale(0); opacity:0; } }
    .anim-fade-in-up { animation: fadeInUp .6s cubic-bezier(.22,1,.36,1) forwards; }
    .anim-bounce-in { animation: bounceIn .5s cubic-bezier(.22,1,.36,1) forwards; }
    .anim-spin { animation: spinSmooth 1.2s linear infinite; }
    .anim-pulse2 { animation: pulse2 2s ease-in-out infinite; }
    .delay-100 { animation-delay: .1s; }
    .delay-200 { animation-delay: .2s; }
    .delay-300 { animation-delay: .3s; }
    .glass { background: rgba(255,255,255,.04); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,.08); }
    .btn-gradient { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%); background-size: 200% 200%; transition: all .3s ease; }
    .btn-gradient:hover { background-position: 100% 100%; box-shadow: 0 8px 32px rgba(99,102,241,.4); transform: translateY(-1px); }
    .btn-gradient:active { transform: translateY(0); }
    .shimmer-bar { background: linear-gradient(90deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.03) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ========== SVG Icon Components (Lucide-style) ========== */
    const I = ({ d, children, size = 24, className = '', ...p }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill="none" stroke="currentColor" strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
        className={className} {...p}>
        {d ? <path d={d} /> : children}
      </svg>
    );
    const IconSparkles = (p) => <I {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></I>;
    const IconUsers = (p) => <I {...p}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></I>;
    const IconSmartphone = (p) => <I {...p}><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></I>;
    const IconUpload = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></I>;
    const IconCheck = (p) => <I {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></I>;
    const IconAlert = (p) => <I {...p}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></I>;
    const IconLoader = (p) => <I {...p}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></I>;
    const IconDownload = (p) => <I {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></I>;
    const IconRefresh = (p) => <I {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></I>;
    const IconPlus = (p) => <I {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></I>;
    const IconFile = (p) => <I {...p}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></I>;

    /* ========== Phone Number Utilities ========== */
    function normalizePhone(phone) {
      return phone.replace(/[\s\-\(\)\.\u3000\uff0d]/g, '').replace(/^\+81/, '0');
    }

    function digitsOnly(phone) {
      return phone.replace(/\D/g, '');
    }

    function formatPhone(raw) {
      const d = digitsOnly(normalizePhone(raw));
      if (!d) return raw;
      // Mobile 070/080/090/050 → 3-4-4
      if (/^0[5789]0/.test(d) && d.length === 11) return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
      // Toll-free 0120 → 4-3-3
      if (/^0120/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,7)+'-'+d.slice(7);
      // Toll-free 0800 → 4-4-3
      if (/^0800/.test(d) && d.length === 11) return d.slice(0,4)+'-'+d.slice(4,8)+'-'+d.slice(8);
      // 2-digit area code (03,06) → 2-4-4
      if (/^0[36]/.test(d) && d.length === 10) return d.slice(0,2)+'-'+d.slice(2,6)+'-'+d.slice(6);
      // 10 digits, 3-digit area code → 3-3-4
      if (/^0\d{2}/.test(d) && d.length === 10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
      // 11 digits, 4-digit area code → 4-2-5 (less common but safe pattern)
      if (/^0\d{3}/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6);
      return raw;
    }

    /* ========== VCF Parser ========== */
    function parseVCF(text) {
      const contacts = [];
      // Unfold continuation lines (RFC 2425)
      const unfolded = text.replace(/\r\n[ \t]/g, '').replace(/\r(?!\n)/g, '\r\n');
      const blocks = unfolded.split(/(?=BEGIN:VCARD)/i);

      for (const block of blocks) {
        if (!block.trim().match(/^BEGIN:VCARD/i)) continue;
        const lines = block.split(/\r?\n/);
        let fn = '', nName = '';
        const phones = [], emails = [];

        for (const line of lines) {
          const upperLine = line.toUpperCase();
          if (upperLine.startsWith('FN')) {
            const m = line.match(/^FN[^:]*:(.*)/i);
            if (m) fn = m[1].trim();
          } else if (upperLine.startsWith('N;') || upperLine.startsWith('N:')) {
            const m = line.match(/^N[^:]*:(.*)/i);
            if (m) {
              const parts = m[1].split(';');
              nName = ((parts[0]||'')+ ' ' + (parts[1]||'')).trim();
            }
          } else if (upperLine.startsWith('TEL')) {
            const m = line.match(/^TEL[^:]*:(.*)/i);
            if (m && m[1].trim()) phones.push(m[1].trim());
          } else if (upperLine.startsWith('EMAIL')) {
            const m = line.match(/^EMAIL[^:]*:(.*)/i);
            if (m && m[1].trim()) emails.push(m[1].trim());
          }
        }

        const name = fn || nName || '';
        if (name || phones.length || emails.length) {
          contacts.push({ name: name || '(名前なし)', phones, emails });
        }
      }
      return contacts;
    }

    /* ========== Cleansing Engine ========== */
    function cleanseContacts(raw) {
      // 1. Normalize each contact
      const contacts = raw.map(c => ({
        name: c.name.trim(),
        phones: c.phones.map(p => normalizePhone(p)),
        emails: [...c.emails],
      }));

      // 2. Deduplicate phones within each contact
      contacts.forEach(c => {
        const seen = new Set();
        c.phones = c.phones.filter(p => {
          const key = digitsOnly(p);
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      });

      // 3. Merge contacts with identical names
      const map = new Map();
      for (const c of contacts) {
        const key = c.name;
        if (map.has(key)) {
          const ex = map.get(key);
          for (const p of c.phones) {
            const dg = digitsOnly(p);
            if (!ex.phones.some(ep => digitsOnly(ep) === dg)) ex.phones.push(p);
          }
          for (const e of c.emails) {
            const lo = e.toLowerCase();
            if (!ex.emails.some(ee => ee.toLowerCase() === lo)) ex.emails.push(e);
          }
        } else {
          map.set(key, { name: c.name, phones: [...c.phones], emails: [...c.emails] });
        }
      }

      // 4. Format phones with hyphens
      return Array.from(map.values()).map(c => ({
        ...c,
        phones: c.phones.map(formatPhone),
      }));
    }

    /* ========== VCF Generator (vCard 3.0, UTF-8) ========== */
    function generateVCF(contacts) {
      let out = '';
      for (const c of contacts) {
        out += 'BEGIN:VCARD\r\n';
        out += 'VERSION:3.0\r\n';
        out += 'FN:' + c.name + '\r\n';
        const parts = c.name.split(/\s+/);
        if (parts.length >= 2) {
          out += 'N:' + parts[0] + ';' + parts.slice(1).join(' ') + ';;;\r\n';
        } else {
          out += 'N:' + c.name + ';;;;\r\n';
        }
        for (const p of c.phones) out += 'TEL;TYPE=CELL:' + p + '\r\n';
        for (const e of c.emails) out += 'EMAIL;TYPE=INTERNET:' + e + '\r\n';
        out += 'END:VCARD\r\n';
      }
      return out;
    }

    function downloadVCF(vcfStr) {
      const bom = '\uFEFF';
      const blob = new Blob([bom + vcfStr], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'contacts_cleaned.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    /* ========== UI Components ========== */

    function GlassCard({ children, className = '', style = {} }) {
      return (
        <div className={`glass rounded-3xl p-6 sm:p-8 shadow-2xl shadow-indigo-500/10 ${className}`} style={style}>
          {children}
        </div>
      );
    }

    function GradientButton({ children, onClick, className = '', id, disabled = false }) {
      return (
        <button id={id} onClick={onClick} disabled={disabled}
          className={`btn-gradient w-full text-white font-semibold rounded-2xl py-4 px-6 flex items-center justify-center gap-3 text-base
          disabled:opacity-40 disabled:cursor-not-allowed transition-all ${className}`}>
          {children}
        </button>
      );
    }

    function SecondaryButton({ children, onClick, className = '', id }) {
      return (
        <button id={id} onClick={onClick}
          className={`w-full rounded-2xl py-4 px-6 flex items-center justify-center gap-3 text-base font-medium
          text-white/80 border border-white/10 hover:border-white/20 hover:bg-white/5 transition-all ${className}`}>
          {children}
        </button>
      );
    }

    /* --- Idle View --- */
    function IdleView({ hasContactPicker, onPickContacts, onFileClick }) {
      return (
        <div className="anim-fade-in-up">
          <GlassCard>
            {/* Hero icon */}
            <div className="flex justify-center mb-6">
              <div className="relative">
                <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                  <IconUsers size={36} className="text-white" />
                </div>
                <div className="absolute -top-2 -right-2 anim-bounce-in delay-300">
                  <IconSparkles size={22} className="text-amber-400" />
                </div>
              </div>
            </div>

            {/* Title */}
            <h1 className="text-2xl font-bold text-white text-center mb-2">連絡先クリーナー</h1>
            <p className="text-white/50 text-sm text-center mb-8 leading-relaxed">
              アドレス帳の重複・表記ゆれを自動で解消し<br/>
              きれいなVCFファイルにエクスポートします
            </p>

            {/* Feature pills */}
            <div className="flex flex-wrap justify-center gap-2 mb-8">
              {['重複を統合','番号を統一','ワンタップ'].map((t, i) => (
                <span key={i} className="text-xs text-indigo-300/80 bg-indigo-500/10 border border-indigo-500/20 rounded-full px-3 py-1">
                  {t}
                </span>
              ))}
            </div>

            {/* Action buttons */}
            <div className="space-y-3">
              {hasContactPicker && (
                <GradientButton id="btn-contact-picker" onClick={onPickContacts}>
                  <IconSmartphone size={20} />
                  アドレス帳から選択して整理
                </GradientButton>
              )}
              <div onClick={onFileClick}>
                {hasContactPicker ? (
                  <SecondaryButton id="btn-vcf-upload">
                    <IconFile size={20} />
                    VCFファイルを選択して整理
                  </SecondaryButton>
                ) : (
                  <GradientButton id="btn-vcf-upload-primary">
                    <IconUpload size={20} />
                    VCFファイルを選択して整理
                  </GradientButton>
                )}
              </div>
            </div>

            {/* Hint */}
            <p className="text-white/30 text-xs text-center mt-6">
              {hasContactPicker
                ? 'Contact Picker API に対応しています'
                : 'iPhoneの場合: 連絡先アプリ → 共有 → VCFで書き出し'}
            </p>
          </GlassCard>
        </div>
      );
    }

    /* --- Processing View --- */
    function ProcessingView() {
      return (
        <div className="anim-fade-in-up">
          <GlassCard className="text-center">
            <div className="flex justify-center mb-6">
              <div className="w-16 h-16 rounded-full bg-indigo-500/20 flex items-center justify-center">
                <IconLoader size={32} className="text-indigo-400 anim-spin" />
              </div>
            </div>
            <h2 className="text-xl font-bold text-white mb-2">整理しています…</h2>
            <p className="text-white/40 text-sm mb-6">重複を検出し、データをクリーンアップ中</p>
            <div className="space-y-2">
              <div className="shimmer-bar h-2 rounded-full"></div>
              <div className="shimmer-bar h-2 rounded-full w-3/4 mx-auto"></div>
            </div>
          </GlassCard>
        </div>
      );
    }

    /* --- Done View --- */
    function DoneView({ originalCount, cleanedCount, onReset }) {
      const reduced = originalCount - cleanedCount;
      return (
        <div className="anim-fade-in-up">
          <GlassCard className="text-center relative overflow-hidden">
            {/* Confetti */}
            <div className="absolute top-1/3 left-1/2 pointer-events-none" aria-hidden="true">
              <div className="w-2 h-2 bg-amber-400 rounded-full absolute" style={{animation:'confetti1 1s ease-out forwards'}}/>
              <div className="w-2 h-2 bg-emerald-400 rounded-full absolute" style={{animation:'confetti2 1.1s ease-out forwards'}}/>
              <div className="w-1.5 h-1.5 bg-violet-400 rounded-full absolute" style={{animation:'confetti3 .9s ease-out forwards'}}/>
              <div className="w-2 h-2 bg-rose-400 rounded-full absolute" style={{animation:'confetti4 1.05s ease-out forwards'}}/>
            </div>

            <div className="flex justify-center mb-5">
              <div className="w-20 h-20 rounded-full bg-emerald-500/20 flex items-center justify-center anim-bounce-in">
                <IconCheck size={40} className="text-emerald-400" />
              </div>
            </div>
            <h2 className="text-xl font-bold text-white mb-3">整理が完了しました！</h2>

            {/* Stats card */}
            <div className="bg-white/5 rounded-2xl p-5 mb-6 space-y-3 text-left">
              <div className="flex items-center justify-between">
                <span className="text-white/50 text-sm">元の連絡先</span>
                <span className="text-white font-bold text-lg">{originalCount}<span className="text-white/40 text-sm ml-1">件</span></span>
              </div>
              <div className="border-t border-white/5"></div>
              <div className="flex items-center justify-between">
                <span className="text-white/50 text-sm">整理後</span>
                <span className="text-emerald-400 font-bold text-lg">{cleanedCount}<span className="text-emerald-400/60 text-sm ml-1">件</span></span>
              </div>
              {reduced > 0 && (
                <>
                  <div className="border-t border-white/5"></div>
                  <div className="flex items-center justify-between">
                    <span className="text-white/50 text-sm">削減</span>
                    <span className="text-amber-400 font-bold text-lg">-{reduced}<span className="text-amber-400/60 text-sm ml-1">件</span></span>
                  </div>
                </>
              )}
            </div>

            <p className="text-white/40 text-sm mb-6">
              VCFファイルがダウンロードされました 📥<br/>
              Androidの連絡先アプリでインポートできます
            </p>

            <SecondaryButton id="btn-reset" onClick={onReset}>
              <IconRefresh size={18} />
              もう一度整理する
            </SecondaryButton>
          </GlassCard>
        </div>
      );
    }

    /* --- Error View --- */
    function ErrorView({ message, onReset }) {
      return (
        <div className="anim-fade-in-up">
          <GlassCard className="text-center">
            <div className="flex justify-center mb-5">
              <div className="w-16 h-16 rounded-full bg-rose-500/20 flex items-center justify-center anim-bounce-in">
                <IconAlert size={32} className="text-rose-400" />
              </div>
            </div>
            <h2 className="text-xl font-bold text-white mb-2">エラーが発生しました</h2>
            <p className="text-white/50 text-sm mb-6 leading-relaxed">{message}</p>
            <SecondaryButton id="btn-error-retry" onClick={onReset}>
              <IconRefresh size={18} />
              やり直す
            </SecondaryButton>
          </GlassCard>
        </div>
      );
    }

    /* --- Install PWA Button --- */
    function InstallButton({ deferredPrompt, onInstall }) {
      if (!deferredPrompt) return null;
      return (
        <button id="btn-install-pwa" onClick={onInstall}
          className="fixed bottom-6 right-6 z-50 btn-gradient text-white font-semibold rounded-2xl py-3 px-5
          flex items-center gap-2 shadow-xl shadow-indigo-500/30 anim-fade-in-up text-sm">
          <IconDownload size={18} />
          インストール
        </button>
      );
    }

    /* ========== Main App ========== */
    function App() {
      const [state, setState] = useState('idle');
      const [originalCount, setOriginalCount] = useState(0);
      const [cleanedCount, setCleanedCount] = useState(0);
      const [errorMessage, setErrorMessage] = useState('');
      const [hasContactPicker, setHasContactPicker] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isStandalone, setIsStandalone] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        setHasContactPicker('contacts' in navigator && 'ContactsManager' in window);
        setIsStandalone(
          window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true
        );
        const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        // Register service worker
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const processContacts = useCallback((rawContacts) => {
        setState('processing');
        setOriginalCount(rawContacts.length);
        setTimeout(() => {
          try {
            const cleaned = cleanseContacts(rawContacts);
            setCleanedCount(cleaned.length);
            const vcf = generateVCF(cleaned);
            downloadVCF(vcf);
            setState('done');
          } catch (err) {
            console.error(err);
            setErrorMessage('データの処理中にエラーが発生しました。');
            setState('error');
          }
        }, 900);
      }, []);

      const handleContactPicker = useCallback(async () => {
        try {
          const contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: true });
          if (!contacts || contacts.length === 0) return;
          const parsed = contacts.map(c => ({
            name: (c.name && c.name[0]) || '(名前なし)',
            phones: c.tel || [],
            emails: c.email || [],
          }));
          processContacts(parsed);
        } catch (err) {
          if (err.name !== 'AbortError') {
            setErrorMessage('連絡先の読み込みに失敗しました。ブラウザの設定を確認してください。');
            setState('error');
          }
        }
      }, [processContacts]);

      const handleFileUpload = useCallback((e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const contacts = parseVCF(evt.target.result);
            if (contacts.length === 0) {
              setErrorMessage('VCFファイルに連絡先が見つかりませんでした。ファイルの内容を確認してください。');
              setState('error');
              return;
            }
            processContacts(contacts);
          } catch (err) {
            setErrorMessage('VCFファイルの読み込みに失敗しました。ファイルの形式を確認してください。');
            setState('error');
          }
        };
        reader.onerror = () => {
          setErrorMessage('ファイルの読み込みに失敗しました。');
          setState('error');
        };
        reader.readAsText(file, 'utf-8');
        e.target.value = '';
      }, [processContacts]);

      const handleInstall = useCallback(async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setDeferredPrompt(null);
      }, [deferredPrompt]);

      const reset = useCallback(() => {
        setState('idle');
        setErrorMessage('');
      }, []);

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-950 via-indigo-950/80 to-slate-950 flex items-center justify-center p-4 relative overflow-hidden">
          {/* Background blobs */}
          <div className="fixed inset-0 pointer-events-none overflow-hidden" aria-hidden="true">
            <div className="absolute -top-32 -right-32 w-72 h-72 bg-indigo-600/15 rounded-full blur-3xl" />
            <div className="absolute -bottom-32 -left-32 w-72 h-72 bg-violet-600/15 rounded-full blur-3xl" />
            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-indigo-500/5 rounded-full blur-3xl" />
          </div>

          {/* Main content */}
          <main className="relative w-full max-w-sm z-10">
            {state === 'idle' && (
              <IdleView
                hasContactPicker={hasContactPicker}
                onPickContacts={handleContactPicker}
                onFileClick={() => fileInputRef.current?.click()}
              />
            )}
            {state === 'processing' && <ProcessingView />}
            {state === 'done' && (
              <DoneView originalCount={originalCount} cleanedCount={cleanedCount} onReset={reset} />
            )}
            {state === 'error' && <ErrorView message={errorMessage} onReset={reset} />}
          </main>

          {/* Hidden file input */}
          <input
            ref={fileInputRef} type="file" accept=".vcf,.vcf"
            className="hidden" onChange={handleFileUpload}
            id="file-input-vcf"
          />

          {/* PWA install button (hidden in standalone mode) */}
          {!isStandalone && <InstallButton deferredPrompt={deferredPrompt} onInstall={handleInstall} />}
        </div>
      );
    }

    /* ========== Mount ========== */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

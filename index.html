<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>連絡先クリーナー – アドレス帳を自動整理</title>
  <meta name="description" content="社内利用向け・完全オフラインで動作する連絡先整理ツール">
  
  <!-- PWA設定 -->
  <meta name="theme-color" content="#F8F9FA">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-512.png" type="image/png">
  <link rel="apple-touch-icon" href="icon-512.png">
  
  <style>
    /* CSS Reset & Variables */
    :root {
      --bg-color: #F8F9FA; --card-bg: #ffffff;
      --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0; --slate-300: #cbd5e1;
      --slate-500: #64748b; --slate-600: #475569; --slate-700: #334155; --slate-800: #1e293b; --slate-900: #0f172a;
      --amber-50: #fffbeb; --amber-100: #fef3c7; --amber-300: #fcd34d; --amber-400: #fbbf24; --amber-500: #f59e0b; --amber-700: #b45309;
      --emerald-50: #ecfdf5; --emerald-100: #d1fae5; --emerald-300: #6ee7b7; --emerald-500: #10b981; --emerald-600: #059669; --emerald-700: #047857;
      --rose-50: #fff1f2; --rose-300: #fda4af; --rose-500: #f43f5e;
      --blue-300: #93c5fd;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background-color: var(--bg-color); color: var(--slate-900);
      letter-spacing: 0.02em; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; position: relative; overflow-x: hidden;
    }

    /* Background pattern */
    .bg-gradient {
      position: absolute; top: 0; left: 0; width: 100%; height: 24rem;
      background: linear-gradient(to bottom, var(--slate-100), transparent);
      pointer-events: none; z-index: 0;
    }

    /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounceIn { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes spinSmooth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes confetti1 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(-40px,-80px) rotate(200deg) scale(0); opacity:0; } }
    @keyframes confetti2 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(50px,-70px) rotate(-180deg) scale(0); opacity:0; } }
    @keyframes confetti3 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(-30px,-90px) rotate(160deg) scale(0); opacity:0; } }
    @keyframes confetti4 { 0% { transform: translate(0,0) rotate(0deg) scale(1); opacity:1; } 100% { transform: translate(60px,-60px) rotate(-220deg) scale(0); opacity:0; } }

    .anim-fade-in-up { animation: fadeInUp .6s cubic-bezier(.22,1,.36,1) forwards; }
    .anim-bounce-in { animation: bounceIn .5s cubic-bezier(.22,1,.36,1) forwards; }
    .anim-spin { animation: spinSmooth 1.2s linear infinite; }
    .delay-300 { animation-delay: .3s; }
    
    .shimmer-bar-light { 
      background: linear-gradient(90deg, var(--slate-100) 25%, var(--slate-200) 50%, var(--slate-100) 75%); 
      background-size: 200% 100%; animation: shimmer 1.8s infinite; 
      height: 6px; border-radius: 9999px; margin-bottom: 12px;
    }
    .shimmer-bar-light.short { width: 75%; margin-inline: auto; }

    /* Layout & Components */
    #app-container { position: relative; z-index: 10; width: 100%; max-width: 24rem; }

    .card {
      background-color: var(--card-bg); border-radius: 2rem; padding: 2rem;
      box-shadow: 0 8px 30px rgba(0,0,0,0.04); border: 1px solid var(--slate-100); text-align: center;
    }
    @media (max-width: 400px) { .card { padding: 1.5rem; } }

    .icon-container { display: flex; justify-content: center; margin-bottom: 2rem; }
    .icon-box { width: 5rem; height: 5rem; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; }
    .icon-box.slate { background-color: var(--slate-50); border: 1px solid var(--slate-100); color: var(--slate-700); }
    .icon-box.emerald { background-color: var(--emerald-50); color: var(--emerald-500); }
    .icon-box.rose { background-color: var(--rose-50); color: var(--rose-500); }
    .icon-box.shadow-sm { box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }

    h1, h2 { font-size: 1.35rem; font-weight: bold; margin-bottom: 0.75rem; letter-spacing: -0.025em; }
    p.subtitle { color: var(--slate-500); font-size: 13px; margin-bottom: 2rem; line-height: 1.6; font-weight: 500; }

    .tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; }
    .tag { font-size: 11px; font-weight: bold; color: var(--slate-600); background-color: var(--slate-100); border-radius: 9999px; padding: 0.375rem 0.75rem; }
    .tag.secure { background-color: var(--emerald-100); color: var(--emerald-700); display: flex; align-items: center; gap: 4px; }

    .btn {
      width: 100%; font-weight: bold; border-radius: 1rem; padding: 1rem 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.75rem; font-size: 15px;
      transition: all 0.2s; cursor: pointer; border: none; font-family: inherit;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background-color: var(--slate-900); color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .btn-primary:hover:not(:disabled) { background-color: var(--slate-800); transform: translateY(-2px); box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    
    .btn-secondary { background-color: white; color: var(--slate-700); border: 1px solid var(--slate-200); }
    .btn-secondary:hover { background-color: var(--slate-50); border-color: var(--slate-300); }
    .btn-secondary:active { background-color: var(--slate-100); }

    .info-box {
      margin-top: 1.25rem; background-color: var(--emerald-50); border: 1px solid var(--emerald-100);
      border-radius: 1rem; padding: 1rem; text-align: left;
    }
    .info-box-title { font-size: 12px; font-weight: bold; color: var(--emerald-700); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 4px; }
    .info-box-desc { font-size: 11.5px; color: var(--emerald-600); font-weight: 500; line-height: 1.6; }

    .stats-box {
      background-color: var(--slate-50); border-radius: 1rem; padding: 1.25rem; margin-bottom: 2rem;
      border: 1px solid var(--slate-100); text-align: left;
    }
    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; }
    .stat-divider { border-top: 1px solid var(--slate-200); opacity: 0.6; }
    .stat-label { color: var(--slate-500); font-size: 13px; font-weight: bold; }
    .stat-value { font-weight: bold; font-size: 1.125rem; color: var(--slate-900); }
    .stat-value.emerald { color: var(--emerald-600); }
    .stat-value.amber { color: var(--amber-500); }
    .stat-unit { font-size: 0.75rem; opacity: 0.6; margin-left: 0.25rem; }

    .confetti-container { position: absolute; top: 33%; left: 50%; pointer-events: none; }
    .confetti { position: absolute; border-radius: 50%; }
    .c1 { width: 8px; height: 8px; background-color: var(--amber-300); animation: confetti1 1s ease-out forwards; }
    .c2 { width: 8px; height: 8px; background-color: var(--emerald-300); animation: confetti2 1.1s ease-out forwards; }
    .c3 { width: 6px; height: 6px; background-color: var(--blue-300); animation: confetti3 .9s ease-out forwards; }
    .c4 { width: 8px; height: 8px; background-color: var(--rose-300); animation: confetti4 1.05s ease-out forwards; }

    input[type="file"] { display: none; }

    /* PWA Install Button */
    #btn-install-pwa {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
      background-color: var(--slate-900); color: white; font-weight: bold;
      border-radius: 1rem; padding: 0.8rem 1.25rem;
      display: none; align-items: center; gap: 0.5rem; font-size: 13px;
      box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.15); border: none; cursor: pointer;
      transition: transform 0.2s; font-family: inherit;
      animation: fadeInUp 0.5s ease-out;
    }
    #btn-install-pwa:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>

  <main id="app-container">
    <!-- UIはJSでここにレンダリングされます -->
  </main>

  <input type="file" id="file-input-vcf" accept=".vcf,.vcard,text/vcard" onchange="App.handleFileUpload(event)">

  <!-- PWA Install Button -->
  <button id="btn-install-pwa" onclick="App.handleInstall()">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    アプリをインストール
  </button>

  <script>
    /* ========== SVG Icons ========== */
    const icons = {
      users: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
      sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--amber-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`,
      upload: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
      loader: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="anim-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`,
      check: `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>`,
      alert: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
      refresh: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>`,
      shield: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`
    };

    /* ========== PWA Logic ========== */
    let deferredPrompt;
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(err => console.error('SW registration failed:', err));
      });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!isStandalone) {
        document.getElementById('btn-install-pwa').style.display = 'flex';
      }
    });

    window.addEventListener('appinstalled', () => {
      deferredPrompt = null;
      document.getElementById('btn-install-pwa').style.display = 'none';
      console.log('PWA was installed');
    });

    /* ========== Logic Utilities ========== */
    const hankakuKanaMap = {
        'ｶﾞ': 'ガ', 'ｷﾞ': 'ギ', 'ｸﾞ': 'グ', 'ｹﾞ': 'ゲ', 'ｺﾞ': 'ゴ', 'ｻﾞ': 'ザ', 'ｼﾞ': 'ジ', 'ｽﾞ': 'ズ', 'ｾﾞ': 'ゼ', 'ｿﾞ': 'ゾ',
        'ﾀﾞ': 'ダ', 'ﾁﾞ': 'ヂ', 'ﾂﾞ': 'ヅ', 'ﾃﾞ': 'デ', 'ﾄﾞ': 'ド', 'ﾊﾞ': 'バ', 'ﾋﾞ': 'ビ', 'ﾌﾞ': 'ブ', 'ﾍﾞ': 'ベ', 'ﾎﾞ': 'ボ',
        'ﾊﾟ': 'パ', 'ﾋﾟ': 'ピ', 'ﾌﾟ': 'プ', 'ﾍﾟ': 'ペ', 'ﾎﾟ': 'ポ', 'ｳﾞ': 'ヴ', 'ｱ': 'ア', 'ｲ': 'イ', 'ｳ': 'ウ', 'ｴ': 'エ', 'ｵ': 'オ',
        'ｶ': 'カ', 'ｷ': 'キ', 'ｸ': 'ク', 'ｹ': 'ケ', 'ｺ': 'コ', 'ｻ': 'サ', 'ｼ': 'シ', 'ｽ': 'ス', 'ｾ': 'セ', 'ｿ': 'ソ',
        'ﾀ': 'タ', 'ﾁ': 'チ', 'ﾂ': 'ツ', 'ﾃ': 'テ', 'ﾄ': 'ト', 'ﾅ': 'ナ', 'ﾆ': 'ニ', 'ﾇ': 'ヌ', 'ﾈ': 'ネ', 'ﾉ': 'ノ',
        'ﾊ': 'ハ', 'ﾋ': 'ヒ', 'ﾌ': 'フ', 'ﾍ': 'ヘ', 'ﾎ': 'ホ', 'ﾏ': 'マ', 'ﾐ': 'ミ', 'ﾑ': 'ム', 'ﾒ': 'メ', 'ﾓ': 'モ',
        'ﾔ': 'ヤ', 'ﾕ': 'ユ', 'ﾖ': 'ヨ', 'ﾗ': 'ラ', 'ﾘ': 'リ', 'ﾙ': 'ル', 'ﾚ': 'レ', 'ﾛ': 'ロ', 'ﾜ': 'ワ', 'ｦ': 'ヲ', 'ﾝ': 'ン',
        'ｧ': 'ァ', 'ｨ': 'ィ', 'ｩ': 'ゥ', 'ｪ': 'ェ', 'ｫ': 'ォ', 'ｯ': 'ッ', 'ｬ': 'ャ', 'ｭ': 'ュ', 'ｮ': 'ョ', 'ｰ': 'ー', '､': '、', '｡': '。', '･': '・'
    };
    const hankakuKanaKeys = Object.keys(hankakuKanaMap).sort((a, b) => b.length - a.length);
    const hankakuRegExp = new RegExp('(' + hankakuKanaKeys.join('|') + ')', 'g');

    function toHiragana(str) {
        if (!str) return "";
        let zenkaku = str.replace(hankakuRegExp, match => hankakuKanaMap[match]);
        return zenkaku.replace(/[\u30A1-\u30FA]/g, match => String.fromCharCode(match.charCodeAt(0) - 0x60));
    }

    function normalizePhone(phone) { return phone.replace(/[\s\-\(\)\.\u3000\uff0d]/g, '').replace(/^\+81/, '0'); }
    function digitsOnly(phone) { return phone.replace(/\D/g, ''); }
    function formatPhone(raw) {
      const d = digitsOnly(normalizePhone(raw));
      if (!d) return raw;
      if (/^0[5789]0/.test(d) && d.length === 11) return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
      if (/^0120/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,7)+'-'+d.slice(7);
      if (/^0800/.test(d) && d.length === 11) return d.slice(0,4)+'-'+d.slice(4,8)+'-'+d.slice(8);
      if (/^0[36]/.test(d) && d.length === 10) return d.slice(0,2)+'-'+d.slice(2,6)+'-'+d.slice(6);
      if (/^0\d{2}/.test(d) && d.length === 10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
      if (/^0\d{3}/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6);
      return raw;
    }

    function parseVCF(text) {
      const contacts = [];
      const unfolded = text.replace(/\r\n[ \t]/g, '').replace(/\r(?!\n)/g, '\r\n');
      const blocks = unfolded.split(/(?=BEGIN:VCARD)/i);

      for (const block of blocks) {
        if (!block.trim().match(/^BEGIN:VCARD/i)) continue;
        const lines = block.split(/\r?\n/);
        let fn = '', nName = '', lastName = '', firstName = '';
        let sortString = '', phoneticLast = '', phoneticFirst = '';
        const phones = [], emails = [], adrs = [];

        for (const line of lines) {
          const upperLine = line.toUpperCase();
          if (upperLine.startsWith('FN')) {
            const m = line.match(/^FN[^:]*:(.*)/i);
            if (m) fn = m[1].trim();
          } else if (upperLine.startsWith('N;') || upperLine.startsWith('N:')) {
            const m = line.match(/^N[^:]*:(.*)/i);
            if (m) {
              const parts = m[1].split(';');
              lastName = parts[0] ? parts[0].trim() : '';
              firstName = parts[1] ? parts[1].trim() : '';
              nName = ((lastName)+ ' ' + (firstName)).trim();
            }
          } else if (upperLine.startsWith('TEL')) {
            const m = line.match(/^TEL[^:]*:(.*)/i);
            if (m && m[1].trim()) phones.push(m[1].trim());
          } else if (upperLine.startsWith('EMAIL')) {
            const m = line.match(/^EMAIL[^:]*:(.*)/i);
            if (m && m[1].trim()) emails.push(m[1].trim());
          } else if (upperLine.startsWith('ADR')) {
            const m = line.match(/^ADR[^:]*:(.*)/i);
            if (m && m[1].trim()) adrs.push(m[1].trim());
          } else if (upperLine.startsWith('SORT-STRING')) {
            const m = line.match(/^SORT-STRING[^:]*:(.*)/i);
            if (m) sortString = m[1].trim();
          } else if (upperLine.startsWith('X-PHONETIC-LAST-NAME')) {
            const m = line.match(/^X-PHONETIC-LAST-NAME[^:]*:(.*)/i);
            if (m) phoneticLast = m[1].trim();
          } else if (upperLine.startsWith('X-PHONETIC-FIRST-NAME')) {
            const m = line.match(/^X-PHONETIC-FIRST-NAME[^:]*:(.*)/i);
            if (m) phoneticFirst = m[1].trim();
          } else if (upperLine.startsWith('SOUND') && upperLine.includes('X-IRMC-N')) {
            const m = line.match(/^SOUND[^:]*:(.*)/i);
            if (m) {
              const parts = m[1].trim().split(';');
              if (!phoneticLast) phoneticLast = parts[0] || '';
              if (!phoneticFirst) phoneticFirst = parts[1] || '';
            }
          }
        }

        const name = fn || nName || '';
        if (!phoneticLast && !phoneticFirst && sortString) {
          const parts = sortString.split(/[\s　]+/);
          phoneticLast = parts[0] || '';
          phoneticFirst = parts[1] || '';
        }
        
        if (name || phones.length || emails.length) {
          contacts.push({ 
            name: name || '(名前なし)', lastName, firstName,
            phones, emails, adrs, sortString, phoneticLast, phoneticFirst 
          });
        }
      }
      return contacts;
    }

    function cleanseContacts(raw) {
      const contacts = raw.map(c => ({
        name: c.name.trim(), lastName: c.lastName || '', firstName: c.firstName || '',
        phones: c.phones.map(normalizePhone),
        emails: [...c.emails], adrs: c.adrs ? [...c.adrs] : [],
        sortString: c.sortString || '', phoneticLast: c.phoneticLast || '', phoneticFirst: c.phoneticFirst || '',
      }));

      contacts.forEach(c => {
        const seen = new Set();
        c.phones = c.phones.filter(p => {
          const key = digitsOnly(p);
          if (!key || seen.has(key)) return false;
          seen.add(key); return true;
        });
      });

      const map = new Map();
      for (const c of contacts) {
        const key = c.name;
        if (map.has(key)) {
          const ex = map.get(key);
          for (const p of c.phones) {
            const dg = digitsOnly(p);
            if (!ex.phones.some(ep => digitsOnly(ep) === dg)) ex.phones.push(p);
          }
          for (const e of c.emails) {
            const lo = e.toLowerCase();
            if (!ex.emails.some(ee => ee.toLowerCase() === lo)) ex.emails.push(e);
          }
          for (const a of c.adrs) {
            if (!ex.adrs.some(ea => ea === a)) ex.adrs.push(a);
          }
          if (!ex.lastName && c.lastName) ex.lastName = c.lastName;
          if (!ex.firstName && c.firstName) ex.firstName = c.firstName;
          if (!ex.phoneticLast && c.phoneticLast) ex.phoneticLast = c.phoneticLast;
          if (!ex.phoneticFirst && c.phoneticFirst) ex.phoneticFirst = c.phoneticFirst;
        } else {
          map.set(key, { ...c });
        }
      }

      return Array.from(map.values()).map(c => ({
        ...c, phones: c.phones.map(formatPhone),
      }));
    }

    function generateVCF(contacts) {
      let out = '';
      for (const c of contacts) {
        out += 'BEGIN:VCARD\r\nVERSION:3.0\r\n';
        let finalLName = c.lastName || '';
        let finalFName = c.firstName || '';
        
        if (!finalLName && !finalFName && c.name && c.name !== '(名前なし)') {
            const parts = c.name.split(/[\s　]+/);
            finalLName = parts[0] || '';
            finalFName = parts.slice(1).join(' ') || '';
        }
        
        const fullName = (finalLName + ' ' + finalFName).trim();
        out += `N;CHARSET=UTF-8:${finalLName};${finalFName};;;\r\n`;
        out += `FN;CHARSET=UTF-8:${fullName}\r\n`;
        
        const soundLast = toHiragana(c.phoneticLast || '');
        const soundFirst = toHiragana(c.phoneticFirst || '');
        out += `SOUND;X-IRMC-N;CHARSET=UTF-8:${soundLast};${soundFirst};;;\r\n`;
        
        if (c.phones && c.phones.length > 0) {
            for (const p of c.phones) out += `TEL;WORK:${p}\r\n`;
        } else { out += `TEL;WORK:\r\n`; }
        
        if (c.emails && c.emails.length > 0) {
            for (const e of c.emails) out += `EMAIL;HOME:${e}\r\n`;
        } else { out += `EMAIL;HOME:\r\n`; }
        
        if (c.adrs && c.adrs.length > 0) {
            for (const a of c.adrs) out += `ADR;HOME:${a}\r\n`;
        } else { out += `ADR;HOME:\r\n`; }

        out += 'X-CLASS:PUBLIC\r\nEND:VCARD\r\n';
      }
      return out;
    }

    function downloadVCF(vcfStr) {
      const bom = '\uFEFF';
      const blob = new Blob([bom + vcfStr], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const d = new Date();
      const dateStr = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      a.download = `contacts_cleaned_${dateStr}.vcf`;
      
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    /* ========== App State & Rendering ========== */
    const App = {
      state: 'idle',
      originalCount: 0, cleanedCount: 0, errorMessage: '',

      setState(newState) {
        this.state = newState;
        this.render();
      },

      triggerFileInput() { document.getElementById('file-input-vcf').click(); },

      async handleInstall() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          deferredPrompt = null;
          document.getElementById('btn-install-pwa').style.display = 'none';
        }
      },

      handleFileUpload(e) {
        const file = e.target.files[0];
        if (!file) return;
        
        e.target.value = '';
        this.setState('processing');

        const reader = new FileReader();
        reader.onload = (evt) => {
          setTimeout(() => {
            try {
              const contacts = parseVCF(evt.target.result);
              if (contacts.length === 0) {
                this.errorMessage = 'VCFファイルに連絡先が見つかりませんでした。ファイルの内容を確認してください。';
                this.setState('error'); return;
              }
              
              this.originalCount = contacts.length;
              const cleaned = cleanseContacts(contacts);
              this.cleanedCount = cleaned.length;
              
              const vcf = generateVCF(cleaned);
              downloadVCF(vcf);
              this.setState('done');
            } catch (err) {
              console.error(err);
              this.errorMessage = 'ファイルの読み込みや処理に失敗しました。ファイルの形式を確認してください。';
              this.setState('error');
            }
          }, 600);
        };
        reader.onerror = () => { this.errorMessage = 'ファイルの読み込みに失敗しました。'; this.setState('error'); };
        reader.readAsText(file, 'utf-8');
      },

      reset() {
        this.originalCount = 0; this.cleanedCount = 0; this.errorMessage = '';
        this.setState('idle');
      },

      render() {
        const container = document.getElementById('app-container');
        let html = '';

        if (this.state === 'idle') {
          html = `
            <div class="card anim-fade-in-up">
              <div class="icon-container">
                <div style="position: relative;">
                  <div class="icon-box slate shadow-sm">${icons.users}</div>
                  <div class="anim-bounce-in delay-300" style="position: absolute; top: -8px; right: -8px;">${icons.sparkles}</div>
                </div>
              </div>
              
              <h1>連絡先クリーナー</h1>
              <p class="subtitle">
                アドレス帳の重複・表記ゆれを自動で解消し<br>
                きれいなVCFファイルに整理します
              </p>
              
              <div class="tags">
                <span class="tag">重複統合</span>
                <span class="tag">番号統一</span>
                <span class="tag">ひらがな変換</span>
              </div>

              <button class="btn btn-primary" onclick="App.triggerFileInput()">
                ${icons.upload} VCFファイルで一括処理
              </button>

              <div class="info-box">
                <p class="info-box-title">${icons.shield} セキュリティについて</p>
                <p class="info-box-desc">
                  アプリ上で処理が完結するため、アドレス帳データが外部サーバーに送信されることはありません。
                </p>
              </div>
            </div>
          `;
        } 
        else if (this.state === 'processing') {
          html = `
            <div class="card anim-fade-in-up">
              <div class="icon-container"><div class="icon-box slate">${icons.loader}</div></div>
              <h2>整理しています…</h2>
              <p class="subtitle">指定形式への変換・ひらがな処理中</p>
              <div style="width: 80%; margin: 0 auto; margin-bottom: 2rem;">
                <div class="shimmer-bar-light"></div>
                <div class="shimmer-bar-light short"></div>
              </div>
            </div>
          `;
        }
        else if (this.state === 'done') {
          const reduced = this.originalCount - this.cleanedCount;
          html = `
            <div class="card anim-fade-in-up relative">
              <div class="confetti-container">
                <div class="confetti c1"></div><div class="confetti c2"></div>
                <div class="confetti c3"></div><div class="confetti c4"></div>
              </div>
              <div class="icon-container"><div class="icon-box emerald anim-bounce-in">${icons.check}</div></div>
              <h2>整理が完了しました！</h2>
              
              <div class="stats-box">
                <div class="stat-row"><span class="stat-label">元の連絡先</span><span class="stat-value">${this.originalCount}<span class="stat-unit">件</span></span></div>
                <div class="stat-divider"></div>
                <div class="stat-row"><span class="stat-label">整理後</span><span class="stat-value emerald">${this.cleanedCount}<span class="stat-unit emerald">件</span></span></div>
                ${reduced > 0 ? `<div class="stat-divider"></div><div class="stat-row"><span class="stat-label">削減</span><span class="stat-value amber">-${reduced}<span class="stat-unit amber">件</span></span></div>` : ''}
              </div>

              <p class="subtitle" style="margin-bottom: 2rem;">
                新しいVCFファイルがダウンロードされました 📥<br>連絡先アプリでインポートしてください
              </p>
              <button class="btn btn-secondary" onclick="App.reset()">${icons.refresh} もう一度整理する</button>
            </div>
          `;
        }
        else if (this.state === 'error') {
          html = `
            <div class="card anim-fade-in-up">
              <div class="icon-container"><div class="icon-box rose anim-bounce-in">${icons.alert}</div></div>
              <h2>エラーが発生しました</h2>
              <p class="subtitle">${this.errorMessage}</p>
              <button class="btn btn-secondary" onclick="App.reset()">${icons.refresh} やり直す</button>
            </div>
          `;
        }

        container.innerHTML = html;
      }
    };

    document.addEventListener('DOMContentLoaded', () => { App.render(); });
  </script>
</body>
</html>

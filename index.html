    /* ========== SVG Icon Components ========== */

    /* ========== Kana Utilities ========== */
    const kanaMap = {
        'ガ':'ｶﾞ','ギ':'ｷﾞ','グ':'ｸﾞ','ゲ':'ｹﾞ','ゴ':'ｺﾞ',
        'ザ':'ｻﾞ','ジ':'ｼﾞ','ズ':'ｽﾞ','ゼ':'ｾﾞ','ゾ':'ｿﾞ',
        'ダ':'ﾀﾞ','ヂ':'ﾁﾞ','ヅ':'ﾂﾞ','デ':'ﾃﾞ','ド':'ﾄﾞ',
        'バ':'ﾊﾞ','ビ':'ﾋﾞ','ブ':'ﾌﾞ','ベ':'ﾍﾞ','ボ':'ﾎﾞ',
        'パ':'ﾊﾟ','ピ':'ﾋﾟ','プ':'ﾌﾟ','ペ':'ﾍﾟ','ポ':'ﾎﾟ',
        'ヴ':'ｳﾞ','ア':'ｱ','イ':'ｲ','ウ':'ｳ','エ':'ｴ','オ':'ｵ',
        'カ':'ｶ','キ':'ｷ','ク':'ｸ','ケ':'ｹ','コ':'ｺ',
        'サ':'ｻ','シ':'ｼ','ス':'ｽ','セ':'ｾ','ソ':'ｿ',
        'タ':'ﾀ','チ':'ﾁ','ツ':'ﾂ','テ':'ﾃ','ト':'ﾄ',
        'ナ':'ﾅ','ニ':'ﾆ','ヌ':'ﾇ','ネ':'ﾈ','ノ':'ﾉ',
        'ハ':'ﾊ','ヒ':'ﾋ','フ':'ﾌ','ヘ':'ﾍ','ホ':'ﾎ',
        'マ':'ﾏ','ミ':'ﾐ','ム':'ﾑ','メ':'ﾒ','モ':'ﾓ',
        'ヤ':'ﾔ','ユ':'ﾕ','ヨ':'ﾖ','ラ':'ﾗ','リ':'ﾘ','ル':'ﾙ','レ':'ﾚ','ロ':'ﾛ',
        'ワ':'ﾜ','ヲ':'ｦ','ン':'ﾝ','ァ':'ｧ','ィ':'ｨ','ゥ':'ｩ','ェ':'ｪ','ォ':'ｫ',
        'ッ':'ｯ','ャ':'ｬ','ュ':'ｭ','ョ':'ｮ','ー':'ｰ','、':'､','。':'｡','・':'･'
    };

    function toHankakuKana(str) {
        if (!str) return "";
        let kata = str.replace(/[\u3041-\u3096]/g, function(match) {
            const chr = match.charCodeAt(0) + 0x60;
            return String.fromCharCode(chr);
        });
        let reg = new RegExp('(' + Object.keys(kanaMap).join('|') + ')', 'g');
        return kata.replace(reg, function(match) {
            return kanaMap[match];
        });
    }

    /* ========== Phone Number Utilities ========== */
    function normalizePhone(phone) {
      return phone.replace(/[\s\-\(\)\.\u3000\uff0d]/g, '').replace(/^\+81/, '0');
    }

    function digitsOnly(phone) {
      return phone.replace(/\D/g, '');
    }

    function formatPhone(raw) {
      const d = digitsOnly(normalizePhone(raw));
      if (!d) return raw;
      if (/^0[5789]0/.test(d) && d.length === 11) return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);
      if (/^0120/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,7)+'-'+d.slice(7);
      if (/^0800/.test(d) && d.length === 11) return d.slice(0,4)+'-'+d.slice(4,8)+'-'+d.slice(8);
      if (/^0[36]/.test(d) && d.length === 10) return d.slice(0,2)+'-'+d.slice(2,6)+'-'+d.slice(6);
      if (/^0\d{2}/.test(d) && d.length === 10) return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);
      if (/^0\d{3}/.test(d) && d.length === 10) return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6);
      return raw;
    }

    /* ========== VCF Parser ========== */
    function parseVCF(text) {
      const contacts = [];
      const unfolded = text.replace(/\r\n[ \t]/g, '').replace(/\r(?!\n)/g, '\r\n');
      const blocks = unfolded.split(/(?=BEGIN:VCARD)/i);

      for (const block of blocks) {
        if (!block.trim().match(/^BEGIN:VCARD/i)) continue;
        const lines = block.split(/\r?\n/);
        let fn = '', nName = '', lastName = '', firstName = '';
        let sortString = '', phoneticLast = '', phoneticFirst = '';
        const phones = [], emails = [], adrs = [];

        for (const line of lines) {
          const upperLine = line.toUpperCase();
          if (upperLine.startsWith('FN')) {
            const m = line.match(/^FN[^:]*:(.*)/i);
            if (m) fn = m[1].trim();
          } else if (upperLine.startsWith('N;') || upperLine.startsWith('N:')) {
            const m = line.match(/^N[^:]*:(.*)/i);
            if (m) {
              const parts = m[1].split(';');
              lastName = parts[0] ? parts[0].trim() : '';
              firstName = parts[1] ? parts[1].trim() : '';
              nName = ((lastName)+ ' ' + (firstName)).trim();
            }
          } else if (upperLine.startsWith('TEL')) {
            const m = line.match(/^TEL[^:]*:(.*)/i);
            if (m && m[1].trim()) phones.push(m[1].trim());
          } else if (upperLine.startsWith('EMAIL')) {
            const m = line.match(/^EMAIL[^:]*:(.*)/i);
            if (m && m[1].trim()) emails.push(m[1].trim());
          } else if (upperLine.startsWith('ADR')) {
            const m = line.match(/^ADR[^:]*:(.*)/i);
            if (m && m[1].trim()) adrs.push(m[1].trim());
          } else if (upperLine.startsWith('SORT-STRING')) {
            const m = line.match(/^SORT-STRING[^:]*:(.*)/i);
            if (m) sortString = m[1].trim();
          } else if (upperLine.startsWith('X-PHONETIC-LAST-NAME')) {
            const m = line.match(/^X-PHONETIC-LAST-NAME[^:]*:(.*)/i);
            if (m) phoneticLast = m[1].trim();
          } else if (upperLine.startsWith('X-PHONETIC-FIRST-NAME')) {
            const m = line.match(/^X-PHONETIC-FIRST-NAME[^:]*:(.*)/i);
            if (m) phoneticFirst = m[1].trim();
          } else if (upperLine.startsWith('SOUND') && upperLine.includes('X-IRMC-N')) {
            const m = line.match(/^SOUND[^:]*:(.*)/i);
            if (m) {
              const parts = m[1].trim().split(';');
              if (!phoneticLast) phoneticLast = parts[0] || '';
              if (!phoneticFirst) phoneticFirst = parts[1] || '';
            }
          }
        }

        const name = fn || nName || '';
        
        if (!phoneticLast && !phoneticFirst && sortString) {
          const parts = sortString.split(/[\s　]+/);
          phoneticLast = parts[0] || '';
          phoneticFirst = parts[1] || '';
        }
        
        if (name || phones.length || emails.length) {
          contacts.push({ 
            name: name || '(名前なし)', 
            lastName, 
            firstName,
            phones, 
            emails, 
            adrs,
            sortString, 
            phoneticLast, 
            phoneticFirst 
          });
        }
      }
      return contacts;
    }

    /* ========== Cleansing Engine ========== */
    function cleanseContacts(raw) {
      const contacts = raw.map(c => ({
        name: c.name.trim(),
        lastName: c.lastName || '',
        firstName: c.firstName || '',
        phones: c.phones.map(p => normalizePhone(p)),
        emails: [...c.emails],
        adrs: c.adrs ? [...c.adrs] : [],
        sortString: c.sortString || '',
        phoneticLast: c.phoneticLast || '',
        phoneticFirst: c.phoneticFirst || '',
      }));

      contacts.forEach(c => {
        const seen = new Set();
        c.phones = c.phones.filter(p => {
          const key = digitsOnly(p);
          if (!key || seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      });

      const map = new Map();
      for (const c of contacts) {
        const key = c.name;
        if (map.has(key)) {
          const ex = map.get(key);
          for (const p of c.phones) {
            const dg = digitsOnly(p);
            if (!ex.phones.some(ep => digitsOnly(ep) === dg)) ex.phones.push(p);
          }
          for (const e of c.emails) {
            const lo = e.toLowerCase();
            if (!ex.emails.some(ee => ee.toLowerCase() === lo)) ex.emails.push(e);
          }
          for (const a of c.adrs) {
            if (!ex.adrs.some(ea => ea === a)) ex.adrs.push(a);
          }
          // 不足している情報を補完
          if (!ex.lastName && c.lastName) ex.lastName = c.lastName;
          if (!ex.firstName && c.firstName) ex.firstName = c.firstName;
          if (!ex.sortString && c.sortString) ex.sortString = c.sortString;
          if (!ex.phoneticLast && c.phoneticLast) ex.phoneticLast = c.phoneticLast;
          if (!ex.phoneticFirst && c.phoneticFirst) ex.phoneticFirst = c.phoneticFirst;
        } else {
          map.set(key, {
            name: c.name, lastName: c.lastName, firstName: c.firstName,
            phones: [...c.phones], emails: [...c.emails], adrs: [...c.adrs],
            sortString: c.sortString, phoneticLast: c.phoneticLast, phoneticFirst: c.phoneticFirst,
          });
        }
      }

      return Array.from(map.values()).map(c => ({
        ...c,
        phones: c.phones.map(formatPhone),
      }));
    }

    /* ========== Custom VCF Generator ========== */
    function generateVCF(contacts) {
      let out = '';
      for (const c of contacts) {
        out += 'BEGIN:VCARD\r\n';
        out += 'VERSION:3.0\r\n';
        
        let finalLName = c.lastName || '';
        let finalFName = c.firstName || '';
        
        // 姓・名が両方空だが、name がある場合はスペースで分割を試みる
        if (!finalLName && !finalFName && c.name && c.name !== '(名前なし)') {
            const parts = c.name.split(/[\s　]+/);
            finalLName = parts[0] || '';
            finalFName = parts.slice(1).join(' ') || '';
        }
        
        const fullName = (finalLName + ' ' + finalFName).trim();

        // 姓名
        out += `N;CHARSET=UTF-8:${finalLName};${finalFName};;;\r\n`;
        out += `FN;CHARSET=UTF-8:${fullName}\r\n`;
        
        // フリガナ（半角カナ変換）
        const soundLast = toHankakuKana(c.phoneticLast || '');
        const soundFirst = toHankakuKana(c.phoneticFirst || '');
        out += `SOUND;X-IRMC-N;CHARSET=UTF-8:${soundLast};${soundFirst};;;\r\n`;
        
        // 電話番号
        if (c.phones && c.phones.length > 0) {
            for (const p of c.phones) {
                out += `TEL;WORK:${p}\r\n`;
            }
        } else {
            out += `TEL;WORK:\r\n`;
        }
        
        // メールアドレス
        if (c.emails && c.emails.length > 0) {
            for (const e of c.emails) {
                out += `EMAIL;HOME:${e}\r\n`;
            }
        } else {
            out += `EMAIL;HOME:\r\n`;
        }
        
        // 住所
        if (c.adrs && c.adrs.length > 0) {
            for (const a of c.adrs) {
                out += `ADR;HOME:${a}\r\n`;
            }
        } else {
            out += `ADR;HOME:\r\n`;
        }

        // 指定されたカスタム拡張タグ群
        out += 'X-CLASS:PUBLIC\r\n';
        out += 'X-REDUCTION:\r\n';
        out += 'X-NO:\r\n';
        out += 'X-DCM-HMN-MODE:\r\n';
        
        out += 'END:VCARD\r\n';
      }
      return out;
    }

    function downloadVCF(vcfStr) {
      // BOMなしの場合は文字化けする環境があるため、念のためBOMを付与（文字化け防止）
      const bom = '\uFEFF';
      const blob = new Blob([bom + vcfStr], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'contacts_cleaned.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

                  <IconSparkles size={24} className="text-amber-400" />
                </div>
              </div>
            </div>

            <h1 className="text-[1.35rem] font-bold text-slate-900 text-center mb-3 tracking-tight">連絡先クリーナー</h1>
            <p className="text-slate-500 text-[13px] text-center mb-8 leading-relaxed font-medium">

            </p>

            <div className="flex flex-wrap justify-center gap-2 mb-8">

                <div onClick={onFileClick}>
                  <PrimaryButton id={hasContactPicker ? "btn-vcf-upload" : "btn-vcf-upload-primary"}>

                  </PrimaryButton>

              </div>

              {hasContactPicker && (
                <button id="btn-contact-picker" onClick={onPickContacts}
                  className="w-full bg-white hover:bg-slate-50 text-slate-700 font-bold border border-slate-200 rounded-2xl py-4 px-6 flex items-center justify-center gap-3 text-[15px] transition-all hover:border-slate-300 active:bg-slate-100">

    /* --- Processing View --- */
    function ProcessingView() {
      return (
        <div className="anim-fade-in-up">
          <Card className="text-center">
            <div className="flex justify-center mb-6">
              <div className="w-16 h-16 rounded-[1.25rem] bg-slate-50 border border-slate-100 flex items-center justify-center">
                <IconLoader size={32} className="text-slate-700 anim-spin" />
              </div>
            </div>
            <h2 className="text-lg font-bold text-slate-900 mb-2 tracking-tight">整理しています…</h2>
            <p className="text-slate-500 text-[13px] mb-8 font-medium">指定形式への変換・半角カナ処理中</p>
            <div className="space-y-3 w-4/5 mx-auto">
              <div className="shimmer-bar-light h-1.5 rounded-full"></div>
              <div className="shimmer-bar-light h-1.5 rounded-full w-3/4 mx-auto"></div>
            </div>
          </Card>
        </div>
      );
    }

    /* --- Done View --- */
    function DoneView({ originalCount, cleanedCount, onReset }) {
      const reduced = originalCount - cleanedCount;
      return (
        <div className="anim-fade-in-up">
          <Card className="text-center relative overflow-hidden">
            <div className="absolute top-1/3 left-1/2 pointer-events-none" aria-hidden="true">
              <div className="w-2 h-2 bg-amber-300 rounded-full absolute" style={{animation:'confetti1 1s ease-out forwards'}}/>
              <div className="w-2 h-2 bg-emerald-300 rounded-full absolute" style={{animation:'confetti2 1.1s ease-out forwards'}}/>
              <div className="w-1.5 h-1.5 bg-blue-300 rounded-full absolute" style={{animation:'confetti3 .9s ease-out forwards'}}/>
              <div className="w-2 h-2 bg-rose-300 rounded-full absolute" style={{animation:'confetti4 1.05s ease-out forwards'}}/>
            </div>

            <div className="flex justify-center mb-6">
              <div className="w-20 h-20 rounded-[1.5rem] bg-emerald-50 flex items-center justify-center anim-bounce-in">
                <IconCheck size={36} className="text-emerald-500" />
              </div>
            </div>
            <h2 className="text-lg font-bold text-slate-900 mb-5 tracking-tight">整理が完了しました！</h2>

            <div className="bg-slate-50 rounded-2xl p-5 mb-8 space-y-3 text-left border border-slate-100">
              <div className="flex items-center justify-between">
                <span className="text-slate-500 text-[13px] font-bold">元の連絡先</span>
                <span className="text-slate-900 font-bold text-lg">{originalCount}<span className="text-slate-400 text-xs ml-1 font-bold">件</span></span>
              </div>
              <div className="border-t border-slate-200/60"></div>
              <div className="flex items-center justify-between">
                <span className="text-slate-500 text-[13px] font-bold">整理後</span>
                <span className="text-emerald-600 font-bold text-lg">{cleanedCount}<span className="text-emerald-600/60 text-xs ml-1 font-bold">件</span></span>
              </div>
              {reduced > 0 && (
                <>
                  <div className="border-t border-slate-200/60"></div>
                  <div className="flex items-center justify-between">
                    <span className="text-slate-500 text-[13px] font-bold">削減</span>
                    <span className="text-amber-500 font-bold text-lg">-{reduced}<span className="text-amber-500/60 text-xs ml-1 font-bold">件</span></span>
                  </div>
                </>
              )}
            </div>

            <p className="text-slate-500 text-[13px] mb-8 font-medium leading-relaxed">
              指定フォーマットのVCFがダウンロードされました 📥<br/>
              連絡先アプリでインポートしてください
            </p>

            <SecondaryButton id="btn-reset" onClick={onReset}>
              <IconRefresh size={18} />
              もう一度整理する
            </SecondaryButton>
          </Card>
        </div>
      );
    }

    /* --- Error View --- */
    function ErrorView({ message, onReset }) {
      return (
        <div className="anim-fade-in-up">
          <Card className="text-center">
            <div className="flex justify-center mb-6">
              <div className="w-16 h-16 rounded-[1.25rem] bg-rose-50 flex items-center justify-center anim-bounce-in">
                <IconAlert size={32} className="text-rose-500" />
              </div>
            </div>
            <h2 className="text-lg font-bold text-slate-900 mb-3 tracking-tight">エラーが発生しました</h2>
            <p className="text-slate-500 text-[13px] mb-8 font-medium leading-relaxed">{message}</p>
            <SecondaryButton id="btn-error-retry" onClick={onReset}>
              <IconRefresh size={18} />
              やり直す
            </SecondaryButton>
          </Card>
        </div>
      );
    }

    /* --- Install PWA Button --- */
    function InstallButton({ deferredPrompt, onInstall }) {
      if (!deferredPrompt) return null;
      return (
        <button id="btn-install-pwa" onClick={onInstall}
          className="fixed bottom-6 right-6 z-50 bg-slate-900 text-white font-bold rounded-2xl py-3 px-5
          flex items-center gap-2 shadow-lg shadow-slate-900/10 anim-fade-in-up text-[13px] hover:-translate-y-0.5 transition-transform">
          <IconDownload size={18} />
          インストール
        </button>
      );
    }

    /* ========== Main App ========== */
    function App() {
      const [state, setState] = useState('idle');
      const [originalCount, setOriginalCount] = useState(0);
      const [cleanedCount, setCleanedCount] = useState(0);
      const [errorMessage, setErrorMessage] = useState('');
      const [hasContactPicker, setHasContactPicker] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isStandalone, setIsStandalone] = useState(false);
      const fileInputRef = useRef(null);

      useEffect(() => {
        setHasContactPicker('contacts' in navigator && 'ContactsManager' in window);
        setIsStandalone(
          window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true
        );
        const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
        window.addEventListener('beforeinstallprompt', handler);
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
        return () => window.removeEventListener('beforeinstallprompt', handler);
      }, []);

      const processContacts = useCallback((rawContacts) => {
        setState('processing');
        setOriginalCount(rawContacts.length);
        setTimeout(() => {
          try {
            const cleaned = cleanseContacts(rawContacts);
            setCleanedCount(cleaned.length);
            const vcf = generateVCF(cleaned);
            downloadVCF(vcf);
            setState('done');
          } catch (err) {
            console.error(err);
            setErrorMessage('データの処理中にエラーが発生しました。');
            setState('error');
          }
        }, 900);
      }, []);

      const handleContactPicker = useCallback(async () => {
        try {
          const contacts = await navigator.contacts.select(['name', 'tel', 'email'], { multiple: true });
          if (!contacts || contacts.length === 0) return;
          const parsed = contacts.map(c => ({
            name: (c.name && c.name[0]) || '(名前なし)',
            phones: c.tel || [],
            emails: c.email || [],
          }));
          processContacts(parsed);
        } catch (err) {
          if (err.name !== 'AbortError') {
            setErrorMessage('連絡先の読み込みに失敗しました。ブラウザの設定を確認してください。');
            setState('error');
          }
        }
      }, [processContacts]);

      const handleFileUpload = useCallback((e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const contacts = parseVCF(evt.target.result);
            if (contacts.length === 0) {
              setErrorMessage('VCFファイルに連絡先が見つかりませんでした。ファイルの内容を確認してください。');
              setState('error');
              return;
            }
            processContacts(contacts);
          } catch (err) {
            setErrorMessage('VCFファイルの読み込みに失敗しました。ファイルの形式を確認してください。');
            setState('error');
          }
        };
        reader.onerror = () => {
          setErrorMessage('ファイルの読み込みに失敗しました。');
          setState('error');
        };
        reader.readAsText(file, 'utf-8');
        e.target.value = '';
      }, [processContacts]);

      const handleInstall = useCallback(async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') setDeferredPrompt(null);
      }, [deferredPrompt]);

      const reset = useCallback(() => {
        setState('idle');
        setErrorMessage('');
      }, []);

      return (
        <div className="min-h-screen bg-[#F8F9FA] flex items-center justify-center p-4 relative overflow-hidden">
          <div className="absolute top-0 left-0 w-full h-96 bg-gradient-to-b from-slate-100 to-transparent pointer-events-none" />

          <main className="relative w-full max-w-sm z-10">
            {state === 'idle' && (
              <IdleView
                hasContactPicker={hasContactPicker}
                onPickContacts={handleContactPicker}
                onFileClick={() => fileInputRef.current?.click()}
              />
            )}
            {state === 'processing' && <ProcessingView />}
            {state === 'done' && (
              <DoneView originalCount={originalCount} cleanedCount={cleanedCount} onReset={reset} />
            )}
            {state === 'error' && <ErrorView message={errorMessage} onReset={reset} />}
          </main>

          <input
            ref={fileInputRef} type="file" accept=".vcf,.vcard,text/vcard"
            className="hidden" onChange={handleFileUpload}
            id="file-input-vcf"
          />

          {!isStandalone && <InstallButton deferredPrompt={deferredPrompt} onInstall={handleInstall} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
